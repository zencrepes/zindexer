name: Publish Release to Registry
on:
  release:
    types: [published]

jobs:
  npm_publish:
    runs-on: ubuntu-latest

    # id-token is required to generate build provenance attestations
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: yarn
      - run: npm -g install @oclif/dev-cli @oclif/help
      - run: npm --no-git-tag-version version ${{ github.event.release.tag_name }}
      - run: yarn run build
      - run: yarn run build:components
      # Install the packed components package in a scratch project and require
      # every exported subpath, so a broken exports map fails before publishing
      - name: Smoke test components package
        run: |
          npm pack --pack-destination /tmp ./dist/components
          mkdir /tmp/components-smoke
          cd /tmp/components-smoke
          npm init -y
          npm install /tmp/zencrepes-components-*.tgz
          node -e '
            const pkg = require("@zencrepes/components/package.json");
            const subpaths = Object.keys(pkg.exports).filter((p) => p !== "./package.json");
            for (const p of subpaths) require("@zencrepes/components/" + p.slice(2));
            console.log("Loaded " + subpaths.length + " component subpaths");
          '
      # @oclif/config v1 registers ts-node with hardcoded compiler options and
      # never reads tsconfig.json; TypeScript 6 errors (TS5107) on the implicit
      # moduleResolution=node10 unless silenced. Mirrors the default in bin/run.
      - run: oclif-dev manifest
        env:
          TS_NODE_COMPILER_OPTIONS: '{"ignoreDeprecations":"6.0"}'
      # Publish steps skip versions already on the registry, so the workflow
      # can be re-run after a partial failure without "cannot publish over".
      # zindexer publishes via npm trusted publishing (OIDC) — no token. The
      # components package still needs the token until it exists on npmjs and
      # can get its own trusted publisher configuration.
      - name: Publish zindexer
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "zindexer@$VERSION" version >/dev/null 2>&1; then
            echo "zindexer@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi
      - name: Publish components package
        working-directory: dist/components
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@zencrepes/components@$VERSION" version >/dev/null 2>&1; then
            echo "@zencrepes/components@$VERSION already published, skipping"
          else
            npm publish --access public --provenance
          fi

  npm_test:
    needs: [npm_publish]

    runs-on: ubuntu-latest

    container:
      image: node:24-alpine

    steps:
      # Build toolchain so sqlite3's native addon can compile on alpine/Node 24
      - run: apk add --no-cache python3 make g++
      - run: npm -g install zindexer@${{ github.event.release.tag_name }}
      - run: zindexer --help
      - run: zindexer startup
      # Verify the components package is consumable from the registry
      - run: |
          mkdir /tmp/components-consumer
          cd /tmp/components-consumer
          npm init -y
          npm install @zencrepes/components@${{ github.event.release.tag_name }}
          node -e 'require("@zencrepes/components/config"); require("@zencrepes/components/es-utils")'

  docker:
    needs: [npm_test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Get release version
        id: get_version
        run: echo "RELEASE_VERSION=$(echo ${GITHUB_REF:10})" >> $GITHUB_ENV
      - name: Publish to Registry
        uses: elgohr/Publish-Docker-Github-Action@master
        with:
          name: zencrepes/zindexer
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          tags: 'latest,${{ env.RELEASE_VERSION }}'

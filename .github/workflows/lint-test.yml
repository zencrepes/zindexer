name: Lint and test
# This workflow runs on pushes to any branch and on every pull request,
# so tests are executed automatically when a PR is opened or updated.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    container:
      image: node:20-alpine

    steps:
      - uses: actions/checkout@v2
      - run: yarn
      - run: yarn run lint --max-warnings 1

  test:
    name: Test
    runs-on: ubuntu-latest

    container:
      image: node:20-alpine

    steps:
      - uses: actions/checkout@v2
      - run: yarn
      - run: yarn run test

  build:
    needs: [lint, test]
    name: Build
    runs-on: ubuntu-latest
    # if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    container:
      image: node:20-alpine

    steps:
      - uses: actions/checkout@v2
      - run: yarn
      - run: npm install -g typescript@4.2.3
      - run: tsc -b
